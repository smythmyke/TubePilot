<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TubePilot Reactions</title>
  <link rel="stylesheet" href="reactions.css">
</head>
<body>
  <div class="rx-container">
    <!-- Header -->
    <div class="rx-header">
      <div class="rx-header-left">
        <img class="rx-header-icon" src="../icons/icon48.png" alt="TP">
        <h1>TubePilot <span class="rx-header-accent">Reactions</span></h1>
      </div>
      <button class="rx-btn rx-btn-secondary rx-btn-sm" id="minimize-btn">Side Panel &rarr;</button>
    </div>

    <!-- Preview -->
    <div class="rx-section">
      <div class="rx-preview-wrap">
        <video id="preview-video" autoplay muted playsinline></video>
        <canvas id="preview-canvas" style="display:none;"></canvas>
        <div class="rx-preview-placeholder" id="preview-placeholder">
          <span>Camera preview will appear here</span>
        </div>
        <div class="rx-recording-indicator hidden" id="recording-indicator">
          <span class="rx-rec-dot"></span> REC
        </div>
        <div class="rx-paused-indicator hidden" id="paused-indicator">PAUSED</div>
      </div>
    </div>

    <!-- Setup -->
    <div class="rx-section">
      <h2 class="rx-section-title">Setup</h2>
      <div class="rx-form-grid">
        <div class="rx-form-row">
          <label for="camera-select">Camera</label>
          <select id="camera-select"><option value="">Loading...</option></select>
        </div>
        <div class="rx-form-row">
          <label for="mic-select">Microphone</label>
          <select id="mic-select"><option value="">Loading...</option></select>
        </div>
        <div class="rx-form-row rx-form-row-full">
          <label for="tab-select">YouTube Tab</label>
          <div class="rx-tab-row">
            <select id="tab-select"><option value="">Loading...</option></select>
            <button class="rx-btn rx-btn-secondary rx-btn-sm" id="refresh-tabs-btn">Refresh</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PiP Layout -->
    <div class="rx-section">
      <h2 class="rx-section-title">Picture-in-Picture</h2>
      <div class="rx-pip-controls">
        <div class="rx-pip-positions">
          <label>Position:</label>
          <div class="rx-pip-btns">
            <button class="rx-pip-btn" data-pos="top-left" title="Top Left">TL</button>
            <button class="rx-pip-btn" data-pos="top-right" title="Top Right">TR</button>
            <button class="rx-pip-btn" data-pos="bottom-left" title="Bottom Left">BL</button>
            <button class="rx-pip-btn rx-pip-btn-active" data-pos="bottom-right" title="Bottom Right">BR</button>
          </div>
        </div>
        <div class="rx-pip-size">
          <label for="pip-size-slider">Size: <span id="pip-size-value">25</span>%</label>
          <input type="range" id="pip-size-slider" min="15" max="40" value="25" step="1">
        </div>
      </div>
    </div>

    <!-- Volume -->
    <div class="rx-section">
      <h2 class="rx-section-title">Volume</h2>
      <div class="rx-volume-controls">
        <div class="rx-volume-row">
          <label for="tab-volume-slider">YouTube</label>
          <input type="range" id="tab-volume-slider" min="0" max="100" value="75" step="1">
          <span class="rx-volume-val" id="tab-volume-value">75%</span>
        </div>
        <div class="rx-volume-row">
          <label for="mic-volume-slider">Mic</label>
          <input type="range" id="mic-volume-slider" min="0" max="100" value="100" step="1">
          <span class="rx-volume-val" id="mic-volume-value">100%</span>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="rx-section">
      <div class="rx-controls">
        <button class="rx-btn rx-btn-record" id="record-btn" disabled>
          <span class="rx-rec-dot-btn"></span> Record
        </button>
        <button class="rx-btn rx-btn-secondary" id="pause-btn" disabled>Pause</button>
        <button class="rx-btn rx-btn-stop" id="stop-btn" disabled>Stop</button>
      </div>
      <div class="rx-timer" id="timer">00:00:00</div>
      <div class="rx-status" id="status-msg"></div>
    </div>

    <!-- Output (shown after recording stops) -->
    <div class="rx-section rx-output hidden" id="output-section">
      <h2 class="rx-section-title">Recording Output</h2>
      <video id="output-video" controls class="rx-output-video"></video>
      <div class="rx-output-meta" id="output-meta"></div>
      <div class="rx-output-actions">
        <button class="rx-btn rx-btn-primary" id="download-btn">Download</button>
        <button class="rx-btn rx-btn-primary" id="upload-btn">Upload to YouTube</button>
      </div>
      <div class="rx-upload-progress hidden" id="upload-progress">
        <div class="rx-upload-bar"><div class="rx-upload-fill" id="upload-fill"></div></div>
        <span class="rx-upload-text" id="upload-text">Uploading...</span>
      </div>
    </div>
  </div>

  <script src="../services/reactions-state.js"></script>
  <script src="reactions.js"></script>
</body>
</html>
